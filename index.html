<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho&display=swap" rel="stylesheet">

<title>今日の寄り道</title>

<style>

body{
    font-family:"Zen Old Mincho", serif;
    background:
        radial-gradient(circle at 15% 15%, #fdf6d8 0%, transparent 20%),
        radial-gradient(circle at 85% 20%, #dfe9f5 0%, transparent 20%),
        radial-gradient(circle at 20% 80%, #f7e5d5 0%, transparent 20%),
        #faf7f1;
    color:#333;
    margin:0;
    padding:20px;
}

.stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
        radial-gradient(#d7c28f 1.5px, transparent 1.5px),
        radial-gradient(#b9c8e8 1px, transparent 1px);
    background-size:120px 120px, 180px 180px;
    opacity:0.7;
}

#starCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:-1;
}
    
.container{
    max-width:520px;
    margin:0 auto;
}

.catchcopy{
    text-align:center;
    margin-top:80px;
    margin-bottom:80px;
    line-height:1.9;
}

.catchcopy h1{
    font-size:2rem;
    font-weight:500;
    line-height:1.8;
}

.catchcopy p{
    color:#7f7f7f;
    line-height:2;
}

.mission-card{
    background:#fffdf9;
    border:none;
    border-radius:35px;
    box-shadow:
      0 10px 30px rgba(120,100,80,0.08);
    padding:50px 35px;
    text-align:center;
}

.date-title{
    display:inline-block;
    background:#f7f0dc;
    padding:8px 18px;
    border-radius:999px;
    font-size:0.9rem;
    margin-bottom:35px;
}

.mission{
    font-size:1.5rem;
    line-height:1.8;
    font-weight:600;
    max-width:11em;
    margin:0 auto;
    text-align:center;
}

.mission-comment{
    margin-top:30px;
    padding-top:25px;
    border-top:1px solid #e8e3d8;
    color:#888;
    font-size:1rem;
    text-align:center;
    line-height:2;
    max-width:380px;
    margin-left:auto;
    margin-right:auto;
}
    
.note{
    margin-top:25px;
    color:#777;
    font-size:0.95rem;
}

.reaction-area{
    display:flex;
    gap:12px;
    margin-top:20px;
    width:86%;
    margin-left:auto;
    margin-right:auto;
}

.reaction{
    flex:1;
    text-align:center;
}

.reaction button{
    width:100%;
    height:85px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:none;
    border-radius:28px;
    font-family:"Zen Old Mincho", serif;
    font-size:1.0rem;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 4px 12px rgba(120,100,80,0.08);
}

.count{
    margin-top:8px;
    color:#777;
    font-size:0.85rem;
}
    
.done{
    background:#dfeeda;
}

.later{
    background:#e2ecf7;
}

.rest{
    background:#f1ece4;
}

.reaction button:hover{
    transform:translateY(-3px);
}

.reaction button:disabled{
    opacity:0.5;
    cursor:default;
}

.rate{
    text-align:center;
    margin-top:18px;
    color:#7a8a6a;
    font-size:0.95rem;
}
    
.footer-message{
    text-align:center;
    margin-top:30px;
    color:#888;
    line-height:1.8;
}

.footer-links{
    text-align:center;
    margin-top:40px;
}

.footer-links a{
    color:#8a7b65;
    text-decoration:none;
    border-bottom:1px solid #d8cfbf;
    padding-bottom:2px;
}

.footer-links a:hover{
    opacity:0.7;
}

</style>
</head>

<body>

<canvas id="starCanvas"></canvas>

<div class="container">

    <div class="catchcopy">

        <h1>
            同じ生活のくり返しで、<br>
            毎日がつまらない人へ
        </h1>

        <p>
            ほんのすこしだけ、<br>
            違う景色を見てみませんか？
        </p>

    </div>

    <div class="mission-card">

        <div class="date-title" id="dateTitle">
            6月23日のお題
        </div>

        <div class="mission" id="mission">
            帰り道で花をひとつ探してみよう
        </div>

        <div class="mission-comment" id="missionComment">
            コメント
        </div>

    </div>

    <div class="reaction-area">

    <div class="reaction">

        <button class="later" id="tryBtn">
            🌱<br>やってみる
        </button>

        <div class="count" id="tryCount">
            0人
        </div>

    </div>

    <div class="reaction">

        <button class="done" id="doneBtn" disabled>
            ✨<br>やった
        </button>

        <div class="count" id="doneCount">
            0人
        </div>

    </div>

</div>

<div id="rate" class="rate">
    みんなの達成率 0%
</div>
    
<div class="footer-message">
    終わったら、それで十分。
</div>

<div class="footer-links">

    <a href="articles.html">
        読みもの一覧
    </a>

</div>
    
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  updateDoc,
  increment,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyAKf5vk0DJYwnncP_0B2-Na8lcoWDj4Jqo",
  authDomain: "yorimichi-c1f5c.firebaseapp.com",
  projectId: "yorimichi-c1f5c",
  storageBucket: "yorimichi-c1f5c.firebasestorage.app",
  messagingSenderId: "93002965036",
  appId: "1:93002965036:web:5987383321cf8775f8f189"
    
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const today = new Date();

const todayKey =
  `${today.getFullYear()}-${
    String(today.getMonth()+1).padStart(2,"0")
  }-${
    String(today.getDate()).padStart(2,"0")
  }`;

const reactionRef =
  doc(db, "reactions", todayKey);

onSnapshot(
    reactionRef,
    async (snap) => {

        if (!snap.exists()) {

            await setDoc(
                reactionRef,
                {
                    missionId: Number(mission.id),
                    tryCount: 0,
                    doneCount: 0
                }
            );

            return;
        }

        const data = snap.data();

        const tryCount =
            data.tryCount || 0;

        const doneCount =
            data.doneCount || 0;

        document
            .getElementById("tryCount")
            .textContent =
            `${tryCount}人`;

        document
            .getElementById("doneCount")
            .textContent =
            `${doneCount}人`;

        const rate =
            tryCount === 0
            ? 0
            : Math.round(
                doneCount
                /
                tryCount
                * 100
            );

        document
            .getElementById("rate")
            .textContent =
            `達成率 ${rate}%`;

    }
);
    
const todayStorageKey =
    `yorimichi-${todayKey}`;

const status =
    localStorage.getItem(todayStorageKey);

if(status === "try"){

    document
      .getElementById("doneBtn")
      .disabled = false;

    document
      .getElementById("tryBtn")
      .disabled = true;

}

if(status === "done"){

    document
      .getElementById("tryBtn")
      .disabled = true;

    document
      .getElementById("doneBtn")
      .disabled = true;

}

document
  .getElementById("tryBtn")
  .addEventListener("click", async ()=>{

    if(localStorage.getItem(todayStorageKey))
        return;

    await updateDoc(
        reactionRef,
        {
            tryCount: increment(1)
        }
    );

    localStorage.setItem(
        todayStorageKey,
        "try"
    );

    document
      .getElementById("doneBtn")
      .disabled = false;


});

document
  .getElementById("doneBtn")
  .addEventListener("click", async ()=>{

    if(
      localStorage.getItem(todayStorageKey)
      !==
      "try"
    ) return;

    await updateDoc(
        reactionRef,
        {
            doneCount: increment(1)
        }
    );

    localStorage.setItem(
        todayStorageKey,
        "done"
    );

    document
      .getElementById("tryBtn")
      .disabled = true;

    document
      .getElementById("doneBtn")
      .disabled = true;

});


const month = today.getMonth() + 1;
const date = today.getDate();

document.getElementById("dateTitle").textContent =
    `${month}月${date}日のお題`;

fetch("missions.csv")
    .then(response => response.text())
    .then(csv => {

        const rows = csv.trim().split("\n");

        const missions = rows
            .slice(1)
            .map(row => {

                const cols = row.split(",");

                return {
                    id: cols[0],
                    title: cols[1],
                    comment: cols[2]
                };

            });

        const dayNumber =
            Math.floor(
                today.getTime()
                /
                (1000 * 60 * 60 * 24)
            );

        const mission =
            missions[
                dayNumber % missions.length
            ];

        document.getElementById("mission")
            .innerHTML = mission.title;

        document.getElementById("missionComment")
            .innerHTML = mission.comment;

    })
    .catch(error => {
        console.error(error);
    });

const canvas =
    document.getElementById("starCanvas");

const ctx =
    canvas.getContext("2d");

let stars = [];

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    stars = [];

    for(let i=0;i<60;i++){

        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3 + 1,
            speed: Math.random() * 0.4 + 0.1,
            opacity: Math.random() * 0.6 + 0.2
        });

    }
}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    stars.forEach(star=>{

        star.y += star.speed;
        
        if(star.y > canvas.height){
            star.y = -10;
            star.x =
                Math.random() * canvas.width;
        }

        ctx.beginPath();

        ctx.arc(
            star.x,
            star.y,
            star.size,
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
            `rgba(255,220,150,${star.opacity})`;

        ctx.fill();

    });

    requestAnimationFrame(draw);
}

resize();
draw();

window.addEventListener(
    "resize",
    resize
);

</script>

</body>
</html>
