<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho&display=swap" rel="stylesheet">

<title>今日の寄り道</title>

<style>

body{
    font-family:"Zen Old Mincho", serif;
    background:
        radial-gradient(circle at 15% 15%, #fdf6d8 0%, transparent 20%),
        radial-gradient(circle at 85% 20%, #dfe9f5 0%, transparent 20%),
        radial-gradient(circle at 20% 80%, #f7e5d5 0%, transparent 20%),
        #faf7f1;
    color:#333;
    margin:0;
    padding:20px;
}

.stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
        radial-gradient(#d7c28f 1.5px, transparent 1.5px),
        radial-gradient(#b9c8e8 1px, transparent 1px);
    background-size:120px 120px, 180px 180px;
    opacity:0.7;
}

#starCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:-1;
}
    
.container{
    max-width:520px;
    margin:0 auto;
}

.catchcopy{
    text-align:center;
    margin-top:80px;
    margin-bottom:80px;
    line-height:1.9;
}

.catchcopy h1{
    font-size:2rem;
    font-weight:500;
    line-height:1.8;
}

.catchcopy p{
    color:#7f7f7f;
    line-height:2;
}

.mission-card{
    background:#fffdf9;
    border:none;
    border-radius:35px;
    box-shadow:
      0 10px 30px rgba(120,100,80,0.08);
    padding:50px 35px;
    text-align:center;
}

.date-title{
    display:inline-block;
    background:#f7f0dc;
    padding:8px 18px;
    border-radius:999px;
    font-size:0.9rem;
    margin-bottom:35px;
}

.mission{
    font-size:1.5rem;
    line-height:1.8;
    font-weight:600;
    max-width:14em;
    margin:0 auto;
    word-break:keep-all;
}

.mission-comment{
    margin-top:30px;
    padding-top:25px;
    border-top:1px solid #e8e3d8;
    color:#888;
    font-size:1rem;
    line-height:2;
    max-width:380px;
    margin-left:auto;
    margin-right:auto;
}
    
.note{
    margin-top:25px;
    color:#777;
    font-size:0.95rem;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.buttons button{
    width:85px;
    height:85px;
    border:1px solid rgba(0,0,0,0.05);
    border-radius:24px;
    transition:0.2s;
}

.done{
    background:#dfeeda;
}

.later{
    background:#e2ecf7;
}

.rest{
    background:#f1ece4;
}

.buttons button:hover{
    transform:translateY(-3px);
}

.stats{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:8px;
}

.count{
    width:95px;
    text-align:center;
    color:#777;
    font-size:0.85rem;
}
    
.footer-message{
    text-align:center;
    margin-top:30px;
    color:#888;
    line-height:1.8;
}

</style>
</head>

<body>

<canvas id="starCanvas"></canvas>

<div class="container">

    <div class="catchcopy">

        <h1>
            同じ生活のくり返しで、<br>
            毎日がつまらない人へ
        </h1>

        <p>
            ほんのすこしだけ、<br>
            違う景色を見てみませんか？
        </p>

    </div>

    <div class="mission-card">

        <div class="date-title" id="dateTitle">
            6月23日のお題
        </div>

        <div class="mission" id="mission">
            帰り道で花をひとつ探してみよう
        </div>

        <div class="mission-comment">
            道端でも、公園でも。
            見つけたら少しだけ足を止めてみよう。
        </div>

    </div>

    <div class="buttons">

    <button class="done">
        やった！
    </button>

    <button class="later">
        これから<br>やる
    </button>

    <button class="rest">
        今日は<br>おやすみ
    </button>

</div>

<div class="stats">

    <div class="count">324人</div>

    <div class="count">87人</div>

    <div class="count">156人</div>

</div>

<div class="footer-message">
    終わったら、それで十分。
</div>
    
</div>

<script>

const missions = [
    "帰り道で花をひとつ探してみよう",
    "空を見上げて、一番印象に残った雲を覚えて帰ろう",
    "いつもと違う飲み物を選んでみよう",
    "気になるお店の名前を覚えて帰ろう",
    "面白い看板をひとつ見つけよう",
    "一度も使ったことのない出口から駅を出てみよう"
];

const today = new Date();

const month = today.getMonth() + 1;
const date = today.getDate();

document.getElementById("dateTitle").textContent =
    `${month}月${date}日のお題`;

const dayNumber =
    Math.floor(today.getTime() / (1000 * 60 * 60 * 24));

document.getElementById("mission").textContent =
    missions[dayNumber % missions.length];

const canvas =
    document.getElementById("starCanvas");

const ctx =
    canvas.getContext("2d");

let stars = [];

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    stars = [];

    for(let i=0;i<60;i++){

        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3 + 1,
            speed: Math.random() * 0.4 + 0.1,
            opacity: Math.random() * 0.6 + 0.2
        });

    }
}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    stars.forEach(star=>{

        star.y += star.speed;
        
        if(star.y > canvas.height){
            star.y = -10;
            star.x =
                Math.random() * canvas.width;
        }

        ctx.beginPath();

        ctx.arc(
            star.x,
            star.y,
            star.size,
            0,
            Math.PI * 2
        );

        ctx.fillStyle =
            `rgba(255,220,150,${star.opacity})`;

        ctx.fill();

    });

    requestAnimationFrame(draw);
}

resize();
draw();

window.addEventListener(
    "resize",
    resize
);

</script>

</body>
</html>
