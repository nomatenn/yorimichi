<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>今日の寄り道</title>

<style>

body{
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
    background:#f7f4ee;
    color:#333;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:0 auto;
}

.catchcopy{
    text-align:center;
    margin-top:40px;
    margin-bottom:50px;
    line-height:1.9;
}

.catchcopy h1{
    font-size:1.8rem;
    font-weight:600;
    margin-bottom:20px;
}

.catchcopy p{
    font-size:1.1rem;
    color:#666;
}

.mission-card{
    background:white;
    border:3px solid #e6d8b9;
    border-radius:20px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.06);
}

.date-title{
    color:#888;
    font-size:0.95rem;
    margin-bottom:25px;
}

.mission{
    font-size:1.5rem;
    line-height:1.8;
    font-weight:600;
}

.note{
    margin-top:25px;
    color:#777;
    font-size:0.95rem;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:35px;
}

.buttons button{
    flex:1;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:1rem;
    cursor:pointer;
}

.done{
    background:#d7ead5;
}

.later{
    background:#dce8f7;
}

.rest{
    background:#ececec;
}

.buttons button:hover{
    opacity:0.9;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    color:#666;
    font-size:0.9rem;
}

.footer{
    text-align:center;
    margin-top:60px;
    color:#999;
    font-size:0.9rem;
}

</style>
</head>

<body>

<div class="container">

    <div class="catchcopy">

        <h1>
            同じ生活のくり返しで、<br>
            毎日がつまらない人へ
        </h1>

        <p>
            ほんのすこしだけ、<br>
            違う景色を見てみませんか？
        </p>

    </div>

    <div class="mission-card">

        <div class="date-title" id="dateTitle">
            6月23日のお題
        </div>

        <div class="mission" id="mission">
            帰り道で花をひとつ探してみよう
        </div>

        <div class="note">
            終わったら、それで十分。
        </div>

        <div class="buttons">

            <button class="done">
                やった
            </button>

            <button class="later">
                これからやる
            </button>

            <button class="rest">
                おやすみ
            </button>

        </div>

        <div class="stats">

            <div>
                🌱 0人
            </div>

            <div>
                🚶 0人
            </div>

            <div>
                ☕ 0人
            </div>

        </div>

    </div>

    <div class="footer">
        今日も無理のない範囲で。
    </div>

</div>

<script>

const missions = [
    "帰り道で花をひとつ探してみよう",
    "空を見上げて、一番印象に残った雲を覚えて帰ろう",
    "いつもと違う飲み物を選んでみよう",
    "気になるお店の名前を覚えて帰ろう",
    "面白い看板をひとつ見つけよう",
    "一度も使ったことのない出口から駅を出てみよう"
];

const today = new Date();

const month = today.getMonth() + 1;
const date = today.getDate();

document.getElementById("dateTitle").textContent =
    `${month}月${date}日のお題`;

const dayNumber =
    Math.floor(today.getTime() / (1000 * 60 * 60 * 24));

document.getElementById("mission").textContent =
    missions[dayNumber % missions.length];

</script>

</body>
</html>
